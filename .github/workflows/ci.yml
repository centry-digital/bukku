name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    name: CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --workspaces --if-present

      - name: Verify MCP tarball
        run: |
          cd packages/mcp
          npm pack --dry-run 2>&1 | tee /tmp/pack-output.txt
          # Verify no 'core' in dependencies
          node -e "
            const pkg = require('./package.json');
            const deps = Object.keys(pkg.dependencies || {});
            if (deps.some(d => d.includes('core'))) {
              console.error('ERROR: core must not be in published dependencies');
              process.exit(1);
            }
            console.log('MCP tarball dependencies OK:', deps.join(', '));
          "

      - name: Verify CLI tarball
        run: |
          cd packages/cli
          npm pack --dry-run 2>&1 | tee /tmp/cli-pack-output.txt
          node -e "
            const pkg = require('./package.json');
            const deps = Object.keys(pkg.dependencies || {});
            if (deps.some(d => d.includes('core'))) {
              console.error('ERROR: core must not be in published dependencies');
              process.exit(1);
            }
            console.log('CLI tarball dependencies OK:', deps.join(', '));
          "
