# Release flow:
# 1. Update version in packages/mcp/package.json
# 2. git commit + git tag
# 3. git push && git push --tags
# 4. Create GitHub release from the tag
# 5. This workflow auto-publishes to npm via trusted publishing (OIDC)

name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --workspaces --if-present

      - name: Publish to npm
        run: npm publish --workspace packages/mcp --provenance
